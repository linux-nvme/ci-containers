base_images:
  debian: "debian:trixie-slim"
  fedora: "fedora:43"
  tumbleweed: "opensuse/tumbleweed:latest"
  alpine: "alpine:latest"

bundles:
  base:
    debian:
      - clang
      - gcc
      - g++
      - git
      - meson
      - pkg-config
      - swig
      - valgrind
      - xz-utils
      - make
    fedora:
      - clang
      - gcc
      - gcc-c++
      - git
      - meson
      - pkg-config
      - swig
      - valgrind
    tumbleweed:
      - clang
      - gcc
      - gcc-c++
      - git
      - meson
      - pkgconf-pkg-config
      - swig
      - valgrind
    alpine:
      - git
      - gcc
      - meson
      - bash
      - linux-headers
      - musl-dev
      - perl

  python:
    debian:
      - python3
      - python3-dev
      - python3-pip
      - python3-venv
    fedora:
      - python3
      - python3-devel
      - python3-pip
    tumbleweed:
      - python3
      - python3-devel
      - python3-pip
      - python3-virtualenv
    alpine:
      - python3
      - python3-dev
      - py3-pip
      - py3-virtualenv
