base_images:
  debian: "debian:trixie-slim"
  fedora: "fedora:43"
  tumbleweed: "opensuse/tumbleweed:latest"
  alpine: "alpine:latest"

bundles:
  nvme:
    debian:
      - clang
      - gcc
      - g++
      - git
      - meson
      - pkg-config
      - swig
      - valgrind
      - xz-utils
      - make
      - libjson-c-dev
      - libssl-dev
      - libkeyutils-dev
      - libdbus-1-dev
    fedora:
      - clang
      - gcc
      - gcc-c++
      - git
      - meson
      - pkg-config
      - swig
      - valgrind
      - json-c-devel
      - openssl-devel
      - keyutils-libs-devel
      - dbus-devel
    tumbleweed:
      - clang
      - gcc
      - gcc-c++
      - git
      - meson
      - pkgconf-pkg-config
      - swig
      - valgrind
      - libjson-c-devel
      - libopenssl-devel
      - keyutils-devel
      - dbus-1-devel
    alpine:
      - gcc
      - git
      - meson
      - bash
      - linux-headers
      - musl-dev
      - perl
      - json-c-dev
      - openssl-dev
      - keyutils-dev
      - dbus-dev

  docs:
    debian:
      - python3-sphinx
      - asciidoc
      - xmlto

  musl:
    debian:
      - musl
      - musl-dev
      - musl-tools

  coverage:
    debian:
      - curl
      - gnupg
      - pipx

  coverity:
    debian:
      - file

  python:
    debian:
      - python3
      - python3-dev
      - python3-pip
      - python3-venv
    fedora:
      - python3
      - python3-devel
      - python3-pip
    tumbleweed:
      - python3
      - python3-devel
      - python3-pip
      - python3-virtualenv
    alpine:
      - python3
      - python3-dev
      - py3-pip
      - py3-virtualenv

  muon:
    debian:
      - ca-certificates
      - cmake
      - make
      - git
      - gcc
      - libpkgconf-dev
      - libcurl4-openssl-dev
      - libarchive-dev
      - libpam-dev
      - libcap-ng-dev
      - python3
      - python3-yaml
    fedora:
      - ca-certificates
      - cmake
      - make
      - git
      - gcc
      - pkgconf-pkg-config
      - libcurl-devel
      - libarchive-devel
      - pam-devel
      - libcap-ng-devel
      - python3
      - python3-yaml
    tumbleweed:
      - ca-certificates
      - cmake
      - make
      - git
      - gcc
      - pkg-config
      - libcurl-devel
      - libarchive-devel
      - pam-devel
      - libcap-ng-devel
      - python3
      - python3-PyYAML
    alpine:
      - ca-certificates
      - cmake
      - make
      - git
      - gcc
      - pkgconf
      - curl-dev
      - libarchive-dev
      - python3
      - py3-yaml
      - bash

  muon-dep:
    debian:
      - libcurl4
      - libarchive13
    fedora:
      - libcurl
      - libarchive
    tumbleweed:
      - libcurl4
      - libarchive13
    alpine:
      - curl
      - libarchive

