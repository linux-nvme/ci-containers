# SPDX-License-Identifier: GPL-2.0

base_images:
  debian: "debian:trixie-slim"
  fedora: "fedora:43"
  tumbleweed: "opensuse/tumbleweed:latest"
  alpine: "alpine:latest"

bundles:
  base:
    debian:
      - clang
      - gcc
      - g++
      - git
      - meson
      - pkg-config
      - swig
      - valgrind
      - xz-utils
      - make
    fedora:
      - clang
      - gcc
      - gcc-c++
      - git
      - meson
      - pkg-config
      - swig
      - valgrind
    tumbleweed:
      - clang
      - gcc
      - gcc-c++
      - git
      - meson
      - pkgconf-pkg-config
      - swig
      - valgrind
    alpine:
      - git
      - gcc
      - meson
      - bash
      - linux-headers
      - musl-dev
      - perl

  python:
    debian:
      - python3
      - python3-dev
      - python3-pip
      - python3-venv
    fedora:
      - python3
      - python3-devel
      - python3-pip
    tumbleweed:
      - python3
      - python3-devel
      - python3-pip
      - python3-virtualenv
    alpine:
      - python3
      - python3-dev
      - py3-pip
      - py3-virtualenv

  staging:
    debian:
      - ca-certificates
      - cmake
      - make
      - libpkgconf-dev
      - libcurl4-openssl-dev
      - libarchive-dev
      - libpam-dev
      - libcap-ng-dev
      - python3
      - python3-yaml
    fedora:
      - ca-certificates
      - cmake
      - make
      - pkgconf-pkg-config
      - libcurl-devel
      - libarchive-devel
      - pam-devel
      - libcap-ng-devel
      - python3
      - python3-yaml
    tumbleweed:
      - ca-certificates
      - cmake
      - make
      - pkg-config
      - libcurl-devel
      - libarchive-devel
      - pam-devel
      - libcap-ng-devel
      - python3
      - python3-PyYAML
    alpine:
      - ca-certificates
      - cmake
      - make
      - pkgconf
      - curl-dev
      - libarchive-dev
      - python3
      - py3-yaml
